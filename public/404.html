<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Weiterleitung...</title>
    <script>
      (function () {
        var path = window.location.pathname + window.location.search + window.location.hash;
        var redirect = "/?p=" + encodeURIComponent(path.replace(/&/g, "~and~"));
        window.location.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>

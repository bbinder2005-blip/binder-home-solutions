name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /
          VITE_BUSINESS_NAME: ${{ vars.VITE_BUSINESS_NAME }}
          VITE_BUSINESS_EMAIL: ${{ vars.VITE_BUSINESS_EMAIL }}
          VITE_BUSINESS_PHONE: ${{ vars.VITE_BUSINESS_PHONE }}
          VITE_CALENDLY_URL: ${{ vars.VITE_CALENDLY_URL }}
          VITE_CALENDLY_PHONE_URL: ${{ vars.VITE_CALENDLY_PHONE_URL }}
          VITE_CALENDLY_HOME_URL: ${{ vars.VITE_CALENDLY_HOME_URL }}
          VITE_HUBSPOT_PORTAL_ID: ${{ vars.VITE_HUBSPOT_PORTAL_ID }}
          VITE_HUBSPOT_FORM_ID: ${{ vars.VITE_HUBSPOT_FORM_ID }}

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
